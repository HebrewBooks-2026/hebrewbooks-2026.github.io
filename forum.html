<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>פורום HebrewBooks - ארון הספרים הדיגיטלי</title>
<meta name="description" content="פורום הקהילה של ארון הספרים הדיגיטלי — שאלות, דיונים ועזרה.">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800;900&family=Frank+Ruhl+Libre:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#15233f; --navy2:#1e3357; --indigo:#2b4a8b;
    --gold:#caa24a; --gold-soft:#e7c876; --amber:#f0c969;
    --parch:#f7f3ea; --parch2:#efe7d6; --ink:#22293a; --muted:#6a7180;
    --card:#ffffff; --line:#e7ddc7; --ok:#2f8f5b; --danger:#c0492f;
    --shadow:0 12px 40px rgba(21,35,63,.12);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Heebo',-apple-system,'Segoe UI',Arial,sans-serif;color:var(--ink);background:var(--parch);line-height:1.65}
  .serif{font-family:'Frank Ruhl Libre','Heebo',serif}
  .wrap{max-width:1000px;margin:0 auto;padding:0 22px}
  a{color:inherit;text-decoration:none}

  /* ---- top bar ---- */
  header.bar{
    color:#f3eede;
    background:linear-gradient(160deg,var(--navy) 0%,var(--navy2) 60%,#26406e 100%);
    box-shadow:var(--shadow);
  }
  .bar .nav{display:flex;align-items:center;justify-content:space-between;padding:16px 0;gap:14px}
  .brand{display:flex;align-items:center;gap:11px;font-weight:800;font-size:1.25rem}
  .logo{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;
    background:linear-gradient(180deg,var(--gold-soft),var(--gold));color:#2b2208;font-size:1.35rem;
    box-shadow:0 8px 20px rgba(202,162,74,.45)}
  .nav-right{display:flex;align-items:center;gap:12px;font-weight:500}
  .nav-right a.home{opacity:.85}
  .nav-right a.home:hover{color:var(--amber)}

  .btn{display:inline-flex;align-items:center;gap:8px;border:0;cursor:pointer;font-family:inherit;
    font-weight:700;font-size:.96rem;border-radius:11px;padding:10px 18px;
    transition:transform .12s ease,box-shadow .2s ease,background .2s ease}
  .btn:hover{transform:translateY(-1px)}
  .btn-gold{background:linear-gradient(180deg,var(--gold-soft),var(--gold));color:#2b2208;box-shadow:0 8px 20px rgba(202,162,74,.4)}
  .btn-ghost{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.3)}
  .btn-ghost:hover{background:rgba(255,255,255,.18)}
  .btn-sm{padding:6px 12px;font-size:.85rem;border-radius:9px}
  .btn-light{background:#fff;color:var(--navy);border:1px solid var(--line)}
  .btn-danger{background:#fff;color:var(--danger);border:1px solid #e7c4bb}
  .btn-danger:hover{background:#fbeeeb}

  .google-btn{background:#fff;color:#3c4043;border:1px solid #dadce0}
  .google-btn:hover{background:#f7f8f8}
  .google-btn svg{width:18px;height:18px}

  main{padding:28px 0 80px}
  .msg{margin:0 0 18px;padding:12px 16px;border-radius:11px;font-weight:600;display:none}
  .msg.show{display:block}
  .msg.err{background:#fbeeeb;color:var(--danger);border:1px solid #e7c4bb}
  .msg.ok{background:#e9f5ee;color:var(--ok);border:1px solid #bfe0cb}

  .layout{display:grid;grid-template-columns:230px 1fr;gap:24px}
  @media(max-width:760px){.layout{grid-template-columns:1fr}}

  .side h3{font-size:.8rem;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:0 0 10px 4px}
  .cat{display:flex;align-items:center;justify-content:space-between;gap:8px;
    padding:10px 13px;border-radius:11px;cursor:pointer;font-weight:600;color:var(--ink);border:1px solid transparent}
  .cat:hover{background:#fff;border-color:var(--line)}
  .cat.active{background:#fff;border-color:var(--gold);box-shadow:var(--shadow)}

  .panel-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px}
  .panel-head h1{font-size:1.7rem;font-weight:900}

  .card{background:var(--card);border:1px solid var(--line);border-radius:15px;box-shadow:var(--shadow)}
  .topic-row{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:15px 18px;
    border-bottom:1px solid var(--line);cursor:pointer;transition:background .12s}
  .topic-row:last-child{border-bottom:0}
  .topic-row:hover{background:#fbf8f0}
  .topic-row .t-title{font-weight:700;font-size:1.08rem}
  .topic-row .t-meta{color:var(--muted);font-size:.86rem;margin-top:3px}
  .pill{font-size:.78rem;font-weight:700;color:var(--muted);background:var(--parch2);border-radius:999px;padding:4px 11px;white-space:nowrap}
  .lock{color:var(--gold);font-weight:700}
  .empty{padding:40px;text-align:center;color:var(--muted)}

  /* posts */
  .post{padding:18px;border-bottom:1px solid var(--line)}
  .post:last-child{border-bottom:0}
  .post-head{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
  .who{font-weight:800}
  .role-tag{font-size:.72rem;font-weight:800;border-radius:999px;padding:2px 9px}
  .role-admin{background:#f4e6c4;color:#7a5a14}
  .role-moderator{background:#dfe9f7;color:#274a86}
  .when{color:var(--muted);font-size:.83rem}
  .post-body{white-space:pre-wrap;word-break:break-word;font-size:1.04rem}
  .post-actions{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap}
  .staff-menu{margin-inline-start:auto;display:flex;gap:6px}

  form.compose{padding:18px;display:flex;flex-direction:column;gap:12px}
  label.fld{font-weight:700;font-size:.9rem;color:var(--muted)}
  input.in,select.in,textarea.in{width:100%;font-family:inherit;font-size:1rem;color:var(--ink);
    border:1px solid var(--line);border-radius:11px;padding:12px 14px;background:#fff}
  input.in:focus,select.in:focus,textarea.in:focus{outline:0;border-color:var(--gold);box-shadow:0 0 0 3px rgba(202,162,74,.18)}
  textarea.in{min-height:130px;resize:vertical;line-height:1.6}
  .row-actions{display:flex;gap:10px;align-items:center}

  .back{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-weight:700;cursor:pointer;margin-bottom:14px}
  .back:hover{color:var(--ink)}
  .hidden{display:none!important}
  .signed-note{color:var(--muted);text-align:center;padding:22px;font-weight:600}

  /* ---- modal dialog (replaces browser prompt/confirm) ---- */
  .modal-overlay{position:fixed;inset:0;background:rgba(21,35,63,.5);backdrop-filter:blur(2px);
    display:flex;align-items:center;justify-content:center;z-index:50;padding:20px}
  .modal{background:#fff;border-radius:16px;box-shadow:0 30px 80px rgba(21,35,63,.4);
    width:100%;max-width:460px;padding:24px;animation:pop .14s ease}
  @keyframes pop{from{transform:scale(.96);opacity:0}to{transform:scale(1);opacity:1}}
  .modal h2{font-size:1.3rem;font-weight:800;margin-bottom:14px}
  .modal-body{margin-bottom:18px}
  .modal-msg{font-size:1.05rem;color:var(--ink)}
  .modal-sub{color:var(--muted);font-size:.88rem;margin-top:8px;line-height:1.5}
  .modal-actions{display:flex;gap:10px}
  .btn-danger-solid{background:var(--danger);color:#fff}
  .btn-danger-solid:hover{background:#a83d27}

  /* images inside posts */
  .post-img{max-width:100%;max-height:520px;border-radius:11px;margin:8px 0;display:block;border:1px solid var(--line)}
  /* links inside posts */
  .post-link{color:var(--indigo);font-weight:600;text-decoration:underline;text-underline-offset:2px;word-break:break-all}
  .post-link:hover{color:var(--gold)}
  /* rich-text editor toolbar */
  .editor-toolbar{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:8px}
  .fmt-btn{border:1px solid var(--line);background:#fff;border-radius:8px;padding:5px 11px;
    font-family:inherit;font-size:.92rem;font-weight:700;color:var(--ink);cursor:pointer;line-height:1.1}
  .fmt-btn:hover{background:#fbf8f0;border-color:var(--gold)}
  .mode-toggle{margin-inline-start:auto;border:1px solid var(--line);background:#fff;border-radius:8px;
    padding:5px 12px;font-family:inherit;font-size:.85rem;font-weight:700;color:var(--muted);cursor:pointer}
  .editor-toolbar.html-on .mode-toggle{background:#fffdf6;border-color:var(--gold);color:#7a5a14}
  /* rendered rich-HTML posts (guides) */
  .post-body .rich{white-space:normal}
  .post-body .rich h2,.post-body .rich h3,.post-body .rich h4{margin:.7em 0 .3em;line-height:1.3;font-weight:800}
  .post-body .rich h2{font-size:1.4rem;color:var(--navy)}
  .post-body .rich h3{font-size:1.18rem;color:var(--indigo)}
  .post-body .rich h4{font-size:1.05rem;color:var(--ink)}
  .post-body .rich p{margin:.5em 0}
  .post-body .rich ul,.post-body .rich ol{margin:.4em 0;padding-inline-start:1.5em}
  .post-body .rich li{margin:.25em 0}
  .post-body .rich blockquote{margin:.6em 0;padding:.5em .9em;border-inline-start:3px solid var(--gold);
    background:var(--parch);border-radius:8px}
  .post-body .rich hr{border:0;border-top:1px solid var(--line);margin:1.1em 0}
  .post-body .rich code{background:var(--parch2);padding:1px 6px;border-radius:5px;font-size:.92em}
  .post-body .rich pre{background:var(--parch2);padding:10px 12px;border-radius:8px;overflow:auto}
  .post-body .rich a{color:var(--indigo);font-weight:600;text-decoration:underline}

  /* auth modal extras */
  .gbtn-full{width:100%;justify-content:center}
  .auth-divider{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:.85rem;margin:16px 0}
  .auth-divider::before,.auth-divider::after{content:"";flex:1;height:1px;background:var(--line)}
  .tabs{display:flex;gap:6px;margin-bottom:12px}
  .tab{flex:1;padding:9px;border:1px solid var(--line);background:#fff;border-radius:10px;
    font-family:inherit;font-weight:700;color:var(--muted);cursor:pointer}
  .tab.active{border-color:var(--gold);color:var(--ink);background:#fffdf6}
  .auth-fields{display:flex;flex-direction:column;gap:10px}

  /* registration-status banner + admin request rows */
  .status-banner{margin:0 0 18px;padding:14px 16px;border-radius:12px;font-weight:600;
    background:#fbf3df;border:1px solid var(--gold-soft);color:#6b531a;
    display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
  .status-banner.hidden{display:none}
  .req-row{padding:14px 0;border-bottom:1px solid var(--line)}
  .req-row:last-child{border-bottom:0}
  .req-meta{color:var(--muted);font-size:.86rem;margin-top:2px}
  .req-reason{color:var(--ink);margin:8px 0 10px;white-space:pre-wrap}
</style>
</head>
<body>

<header class="bar">
  <div class="wrap">
    <nav class="nav">
      <a href="index.html" class="brand"><span class="logo serif">ס</span> פורום HebrewBooks - ארון הספרים הדיגיטלי</a>
      <div class="nav-right">
        <a href="index.html" class="home">← לאתר הראשי</a>
        <span id="authSlot"></span>
      </div>
    </nav>
  </div>
</header>

<main class="wrap">
  <div id="msg" class="msg"></div>
  <div id="statusBanner" class="status-banner hidden"></div>

  <!-- ===== list view ===== -->
  <section id="viewList" class="layout">
    <aside class="side">
      <h3>קטגוריות</h3>
      <div id="cats"></div>
      <button id="addCatBtn" class="btn btn-light btn-sm hidden" style="margin-top:12px">+ קטגוריה</button>
    </aside>
    <div>
      <div class="panel-head">
        <h1 id="listTitle">נושאים</h1>
        <button id="newTopicBtn" class="btn btn-gold hidden">+ נושא חדש</button>
      </div>
      <div id="topics" class="card"></div>
    </div>
  </section>

  <!-- ===== single topic view ===== -->
  <section id="viewTopic" class="hidden">
    <span class="back" id="backFromTopic">→ חזרה לנושאים</span>
    <div class="panel-head">
      <h1 id="topicTitle"></h1>
      <div id="topicMod" class="row-actions"></div>
    </div>
    <div id="posts" class="card"></div>
    <div id="replyBox" class="card hidden" style="margin-top:16px">
      <form class="compose" id="replyForm">
        <label class="fld">תגובה</label>
        <textarea class="in" id="replyBody" placeholder="כתוב תגובה..." required></textarea>
        <div class="row-actions">
          <button class="btn btn-gold" type="submit">שלח תגובה</button>
          <button class="btn btn-light" type="button" id="replyImgBtn">🖼 תמונה</button>
          <button class="btn btn-light" type="button" id="replyLinkBtn">🔗 קישור</button>
          <input type="file" id="replyImgInput" accept="image/png,image/jpeg,image/gif,image/webp" class="hidden">
        </div>
      </form>
    </div>
    <div id="lockedNote" class="signed-note hidden">🔒 הנושא נעול לתגובות.</div>
  </section>

  <!-- ===== new topic view ===== -->
  <section id="viewNew" class="hidden">
    <span class="back" id="backFromNew">→ ביטול</span>
    <div class="panel-head"><h1>נושא חדש</h1></div>
    <div class="card">
      <form class="compose" id="newTopicForm">
        <div>
          <label class="fld">קטגוריה</label>
          <select class="in" id="newCat"></select>
        </div>
        <div>
          <label class="fld">כותרת</label>
          <input class="in" id="newTitle" maxlength="300" placeholder="כותרת הנושא" required>
        </div>
        <div>
          <label class="fld">תוכן</label>
          <textarea class="in" id="newBody" placeholder="פתח את הדיון..." required></textarea>
        </div>
        <div class="row-actions">
          <button class="btn btn-gold" type="submit">פרסם נושא</button>
          <button class="btn btn-light" type="button" id="newImgBtn">🖼 תמונה</button>
          <button class="btn btn-light" type="button" id="newLinkBtn">🔗 קישור</button>
          <input type="file" id="newImgInput" accept="image/png,image/jpeg,image/gif,image/webp" class="hidden">
        </div>
      </form>
    </div>
  </section>
</main>

<!-- shared modal dialog -->
<div id="modalOverlay" class="modal-overlay hidden">
  <div class="modal" role="dialog" aria-modal="true">
    <h2 id="modalTitle"></h2>
    <div id="modalBody" class="modal-body"></div>
    <div class="modal-actions">
      <button id="modalOk" class="btn btn-gold">אישור</button>
      <button id="modalCancel" class="btn btn-light">ביטול</button>
    </div>
  </div>
</div>

<!-- auth modal: Google + email/password (login / register) -->
<div id="authOverlay" class="modal-overlay hidden">
  <div class="modal" role="dialog" aria-modal="true">
    <h2>התחברות</h2>
    <a id="googleBtn" class="btn google-btn gbtn-full" href="#">
      <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.6l6.7-6.7C35.6 2.4 30.2 0 24 0 14.6 0 6.5 5.4 2.6 13.2l7.8 6.1C12.2 13.6 17.6 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v9h12.7c-.6 3-2.3 5.5-4.8 7.2l7.4 5.7C43.7 38 46.5 31.9 46.5 24.5z"/><path fill="#FBBC05" d="M10.4 28.7c-.5-1.4-.7-2.9-.7-4.7s.3-3.3.7-4.7l-7.8-6.1C.9 16.5 0 20.1 0 24s.9 7.5 2.6 10.8l7.8-6.1z"/><path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.4-5.7c-2 1.4-4.7 2.3-7.8 2.3-6.4 0-11.8-4.1-13.7-9.8l-7.8 6.1C6.5 42.6 14.6 48 24 48z"/></svg>
      התחבר עם Google</a>
    <div class="auth-divider">או באמצעות אימייל</div>
    <div class="tabs">
      <button class="tab active" data-mode="login" type="button">כניסה</button>
      <button class="tab" data-mode="register" type="button">הרשמה</button>
    </div>
    <div class="auth-fields">
      <input id="auFull" class="in hidden" type="text" placeholder="שם פרטי ומשפחה" maxlength="120">
      <input id="auName" class="in hidden" type="text" placeholder="כינוי (יוצג בפורום)" maxlength="80" autocomplete="nickname">
      <input id="auEmail" class="in" type="email" placeholder="אימייל" autocomplete="email">
      <input id="auPass" class="in" type="password" placeholder="סיסמה (לפחות 6 תווים)" autocomplete="current-password">
      <textarea id="auReason" class="in hidden" placeholder="מדוע ברצונך להצטרף לפורום?" maxlength="1000" style="min-height:80px"></textarea>
    </div>
    <div id="authErr" class="modal-msg hidden" style="color:var(--danger);margin-top:12px"></div>
    <div class="modal-actions" style="margin-top:18px">
      <button id="auSubmit" class="btn btn-gold" type="button">כניסה</button>
      <button id="auCancel" class="btn btn-light" type="button">ביטול</button>
    </div>
  </div>
</div>

<!-- join-request modal (shown to Google users who haven't filled the form yet) -->
<div id="joinOverlay" class="modal-overlay hidden">
  <div class="modal" role="dialog" aria-modal="true">
    <h2>בקשת הצטרפות לפורום</h2>
    <p class="modal-sub" style="margin-bottom:14px">ההרשמה טעונה אישור מנהל. מלא את הפרטים והבקשה תועבר לאישור.</p>
    <div class="auth-fields">
      <input id="jFull" class="in" type="text" placeholder="שם פרטי ומשפחה" maxlength="120">
      <input id="jName" class="in" type="text" placeholder="כינוי (יוצג בפורום)" maxlength="80">
      <textarea id="jReason" class="in" placeholder="מדוע ברצונך להצטרף לפורום?" maxlength="1000" style="min-height:90px"></textarea>
    </div>
    <div id="joinErr" class="modal-msg hidden" style="color:var(--danger);margin-top:12px"></div>
    <div class="modal-actions" style="margin-top:16px">
      <button id="jSubmit" class="btn btn-gold" type="button">שלח בקשה</button>
      <button id="jCancel" class="btn btn-light" type="button">לא עכשיו</button>
    </div>
  </div>
</div>

<!-- admin: review pending join requests -->
<div id="reqOverlay" class="modal-overlay hidden">
  <div class="modal" role="dialog" aria-modal="true" style="max-width:580px">
    <h2>בקשות הצטרפות</h2>
    <div id="reqList" class="modal-body"></div>
    <div class="modal-actions"><button id="reqClose" class="btn btn-light" type="button">סגור</button></div>
  </div>
</div>

<!-- edit a post (textarea + image button, mirrors the compose forms) -->
<div id="editOverlay" class="modal-overlay hidden">
  <div class="modal" role="dialog" aria-modal="true" style="max-width:560px">
    <h2>עריכת הודעה</h2>
    <textarea id="editBody" class="in" style="min-height:170px"></textarea>
    <div class="row-actions" style="margin-top:12px">
      <button id="editSave" class="btn btn-gold" type="button">שמור</button>
      <button id="editImgBtn" class="btn btn-light" type="button">🖼 תמונה</button>
      <button id="editLinkBtn" class="btn btn-light" type="button">🔗 קישור</button>
      <input type="file" id="editImgInput" accept="image/png,image/jpeg,image/gif,image/webp" class="hidden">
      <button id="editCancel" class="btn btn-light" type="button">ביטול</button>
    </div>
  </div>
</div>

<!-- admin: manage all users -->
<div id="usersOverlay" class="modal-overlay hidden">
  <div class="modal" role="dialog" aria-modal="true" style="max-width:680px">
    <h2>ניהול משתמשים</h2>
    <div id="usersList" class="modal-body" style="max-height:62vh;overflow:auto"></div>
    <div class="modal-actions"><button id="usersClose" class="btn btn-light" type="button">סגור</button></div>
  </div>
</div>

<script>
// ====== config ======
const API = "https://hebrewbooks-forum-api.hebrewbooks.workers.dev";

// ====== state ======
let token = localStorage.getItem("forum_token") || null;
let me = null;            // current user object or null
let cats = [];            // categories
let activeCat = null;     // selected category id (null = all)
let curTopicId = null;
let curPosts = [];        // posts of the open topic (so edit uses the RAW body, not rendered)

// ====== helpers ======
const $ = (id) => document.getElementById(id);
const RANK = { member: 1, moderator: 2, admin: 3 };
const atLeast = (role) => me && RANK[me.role] >= RANK[role];
// Only an approved, non-blocked user may post (matches the server's canWrite).
const canPost = () => me && me.status === "approved" && !me.is_blocked;

function esc(s){
  return String(s ?? "").replace(/[&<>"']/g, c =>
    ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
}
// Render post body: escape EVERYTHING first, then turn image references into <img>.
// The only HTML we emit from user text is <img> tags WE build (no event handlers → no
// XSS) plus <br> for newlines. Our own uploads are stored as "/img/<key>"; we also
// auto-embed pasted https image URLs.
function resolveImg(u){ return u.startsWith("/img/") ? API + u : u; }
function imgTag(src, alt){ return `<img class="post-img" src="${src}" alt="${alt}" loading="lazy">`; }
// Links open in a new tab. The URL is already HTML-escaped (esc ran first) and the
// regexes only ever capture http(s) URLs — so no javascript:/data: scheme can slip in.
function linkTag(href, label){ return `<a class="post-link" href="${href}" target="_blank" rel="noopener noreferrer">${label}</a>`; }
// ---- safe HTML mode -------------------------------------------------------
// A body that starts with HTML_MARK is rendered as HTML — but ONLY through this
// whitelist sanitizer. The untrusted source is parsed into an INERT document
// (DOMParser runs no scripts and fetches nothing), then a clean tree is rebuilt
// allowing only known-safe tags/attributes. We never feed untrusted text to
// innerHTML; the only innerHTML we read is of the tree WE built. So no <script>,
// event handler (onerror=…), javascript: URL, or CSS url()/expression survives.
const HTML_MARK = "<!--html-->";
const SANITIZE_TAGS  = new Set("B STRONG I EM U S DEL MARK SMALL SUB SUP H2 H3 H4 P DIV BR HR BLOCKQUOTE UL OL LI CODE PRE SPAN A IMG".split(" "));
const SANITIZE_ATTRS = { A: ["href"], IMG: ["src", "alt"] };
const SANITIZE_STYLE = new Set(["color","background-color","text-align","font-weight","font-style","text-decoration"]);
function safeStyle(s){
  const out = [];
  for (const decl of String(s).split(";")){
    const i = decl.indexOf(":"); if (i < 0) continue;
    const prop = decl.slice(0, i).trim().toLowerCase();
    const val  = decl.slice(i + 1).trim();
    if (!SANITIZE_STYLE.has(prop) || !val || val.length > 40) continue;
    if (/[()\\]|url|expression|javascript|@import|&/i.test(val)) continue; // block functions/imports
    out.push(prop + ":" + val);
  }
  return out.join(";");
}
function safeLinkHref(h){ return /^https?:\/\//i.test(h) ? h : null; }
function safeImgSrc(s){
  if (/^https?:\/\//i.test(s)) return s;
  if (/^\/img\/[A-Za-z0-9._\-]+$/.test(s)) return API + s;
  return null;
}
function cleanNodes(src, dest){
  for (const child of Array.from(src.childNodes)){
    if (child.nodeType === 3){ dest.appendChild(document.createTextNode(child.nodeValue)); continue; }
    if (child.nodeType !== 1) continue;                              // drop comments / others
    const tag = child.tagName;
    if (!SANITIZE_TAGS.has(tag)){ cleanNodes(child, dest); continue; } // unwrap unknown tag, keep its text
    const el = document.createElement(tag);
    for (const a of (SANITIZE_ATTRS[tag] || [])){
      if (!child.hasAttribute(a)) continue;
      let v = child.getAttribute(a);
      if (tag === "A"   && a === "href"){ v = safeLinkHref(v); if (!v) continue; }
      if (tag === "IMG" && a === "src" ){ v = safeImgSrc(v);  if (!v) continue; }
      el.setAttribute(a, v);
    }
    if (child.hasAttribute("style")){ const st = safeStyle(child.getAttribute("style")); if (st) el.setAttribute("style", st); }
    if (tag === "A"){
      if (!el.getAttribute("href")){ cleanNodes(child, dest); continue; }  // unsafe href -> unwrap to text
      el.setAttribute("target", "_blank"); el.setAttribute("rel", "noopener noreferrer"); el.className = "post-link";
    }
    if (tag === "IMG"){ if (!el.getAttribute("src")) continue; el.setAttribute("loading", "lazy"); el.className = "post-img"; }
    cleanNodes(child, el);
    dest.appendChild(el);
  }
}
function sanitizeHtml(html){
  const doc = new DOMParser().parseFromString(String(html), "text/html");
  const box = document.createElement("div");
  cleanNodes(doc.body, box);
  return box.innerHTML;
}
function renderBody(text){
  const raw = String(text ?? "");
  if (raw.startsWith(HTML_MARK)){
    let src = raw.slice(HTML_MARK.length).replace(/^\n/, "");
    // Let the 🖼/🔗 buttons' Markdown work inside HTML mode too (then sanitize as usual).
    src = src.replace(/!\[([^\]]*)\]\((\/img\/[A-Za-z0-9._\-]+|https?:\/\/[^\s)]+)\)/g,
      (_, alt, url) => `<img src="${url}" alt="${alt}">`);
    src = src.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,
      (_, label, url) => `<a href="${url}">${label}</a>`);
    // .rich resets the surrounding pre-wrap so HTML block tags space themselves naturally.
    return '<div class="rich">' + sanitizeHtml(src) + '</div>';
  }
  let h = esc(raw);
  // 1) image markdown ![alt](url) -> <img>
  h = h.replace(/!\[([^\]]*)\]\((\/img\/[A-Za-z0-9._\-]+|https?:\/\/[^\s)]+)\)/g,
    (_, alt, url) => imgTag(resolveImg(url), alt));
  // 2) link markdown [text](url) -> <a>  (http/https only; runs AFTER images so ![]() is safe)
  h = h.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,
    (_, label, url) => linkTag(url, label));
  // 3) bare image URLs -> <img>
  h = h.replace(/(^|\s)(\/img\/[A-Za-z0-9._\-]+|https?:\/\/\S+\.(?:png|jpe?g|gif|webp)(?:\?\S*)?)(?=\s|$)/gi,
    (_, pre, url) => pre + imgTag(resolveImg(url), ""));
  // 4) remaining bare http(s) URLs -> <a>. (^|\s) guards against matching inside the
  // href="…"/src="…" we just emitted (those are preceded by a quote, not whitespace).
  h = h.replace(/(^|\s)(https?:\/\/[^\s<]+)/gi, (_, pre, url) => {
    let trail = "";                              // keep trailing sentence punctuation OUT of the link
    const m = url.match(/[.,!?]+$/);
    if (m){ trail = m[0]; url = url.slice(0, -trail.length); }
    return pre + linkTag(url, url) + trail;
  });
  return h.replace(/\n/g, "<br>");
}
function when(ts){
  try { return new Date(ts*1000).toLocaleString("he-IL",{dateStyle:"medium",timeStyle:"short"}); }
  catch { return ""; }
}
function flash(text, kind){
  const m = $("msg"); m.textContent = text; m.className = "msg show " + (kind||"ok");
  if (kind !== "err") setTimeout(()=>{ m.className = "msg"; }, 3500);
}
function show(view){
  for (const v of ["viewList","viewTopic","viewNew"]) $(v).classList.toggle("hidden", v !== view);
  $("viewList").classList.toggle("layout", view === "viewList");
  window.scrollTo(0,0);
}

// ---- modal dialog: replaces browser prompt()/confirm() with styled in-page UI ----
// openModal resolves to a {field:value} map on OK (empty {} if no fields), or null on cancel.
function collectModal(){
  const out = {};
  $("modalBody").querySelectorAll("[data-field]").forEach(el => out[el.getAttribute("data-field")] = el.value);
  return out;
}
function openModal({ title, bodyHTML = "", okText = "אישור", danger = false }){
  return new Promise(resolve => {
    $("modalTitle").textContent = title;
    $("modalBody").innerHTML = bodyHTML;
    const ok = $("modalOk"), cancel = $("modalCancel"), overlay = $("modalOverlay");
    ok.textContent = okText;
    ok.className = "btn " + (danger ? "btn-danger-solid" : "btn-gold");
    overlay.classList.remove("hidden");
    const field = $("modalBody").querySelector("input,textarea,select");
    if (field) field.focus();
    const prevKey = document.onkeydown;
    function close(result){
      overlay.classList.add("hidden");
      ok.onclick = cancel.onclick = overlay.onclick = null;
      document.onkeydown = prevKey;
      resolve(result);
    }
    ok.onclick = () => close(collectModal());
    cancel.onclick = () => close(null);
    overlay.onclick = (e) => { if (e.target === overlay) close(null); };
    document.onkeydown = (e) => {
      if (e.key === "Escape") close(null);
      else if (e.key === "Enter" && e.target.tagName === "INPUT"){ e.preventDefault(); close(collectModal()); }
    };
  });
}
function confirmDialog(title, message, okText = "אישור", danger = true){
  return openModal({ title, bodyHTML: `<p class="modal-msg">${esc(message)}</p>`, okText, danger })
    .then(r => r !== null);
}

async function api(path, opts){
  opts = opts || {};
  const headers = {};
  if (opts.body) headers["Content-Type"] = "application/json";
  if (token) headers["Authorization"] = "Bearer " + token;
  const res = await fetch(API + path, {
    method: opts.method || "GET",
    headers,
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  let data = {};
  try { data = await res.json(); } catch {}
  if (res.status === 401) { // token died — drop it
    if (token) { token = null; localStorage.removeItem("forum_token"); me = null; renderAuth(); }
  }
  if (!res.ok) throw new Error(data.error || ("HTTP " + res.status));
  return data;
}

// ====== auth ======
function renderAuth(){
  const slot = $("authSlot");
  if (me){
    const tag = me.role !== "member"
      ? ` <span class="role-tag role-${me.role}">${me.role==="admin"?"מנהל":"מודרטור"}</span>` : "";
    const adminBtns = atLeast("admin")
      ? ` <button class="btn btn-ghost btn-sm" id="usersBtn">משתמשים</button>` +
        ` <button class="btn btn-ghost btn-sm" id="reqBtn">בקשות</button>`
      : "";
    slot.innerHTML =
      `<span style="opacity:.9">${esc(me.display_name)}${tag}</span>` + adminBtns +
      ` <button class="btn btn-ghost btn-sm" id="logoutBtn">יציאה</button>`;
    $("logoutBtn").onclick = logout;
    if (atLeast("admin")){ $("reqBtn").onclick = openRequests; $("usersBtn").onclick = openUsers; }
  } else {
    slot.innerHTML = `<button class="btn btn-gold btn-sm" id="loginBtn">התחברות</button>`;
    $("loginBtn").onclick = openAuth;
  }
  // role/status-gated UI
  $("newTopicBtn").classList.toggle("hidden", !canPost());
  $("addCatBtn").classList.toggle("hidden", !atLeast("admin"));
  updateStatusBanner();
}

// Shows pending/incomplete/rejected users why they can't post yet.
function updateStatusBanner(){
  const el = $("statusBanner");
  if (!me || me.status === "approved"){ el.classList.add("hidden"); return; }
  if (me.status === "incomplete")
    el.innerHTML = `<span>עליך להשלים בקשת הצטרפות כדי להשתתף בפורום.</span>` +
                   `<button class="btn btn-gold btn-sm" id="bannerJoinBtn">מילוי בקשה</button>`;
  else if (me.status === "pending")
    el.innerHTML = `<span>בקשת ההצטרפות שלך התקבלה וממתינה לאישור מנהל. בינתיים ניתן לקרוא בלבד.</span>`;
  else if (me.status === "rejected")
    el.innerHTML = `<span>בקשת ההצטרפות שלך נדחתה. לפרטים ניתן לפנות למנהל.</span>`;
  el.classList.remove("hidden");
  if (me.status === "incomplete") $("bannerJoinBtn").onclick = openJoin;
}

async function refreshMe(){
  if (!token){ me = null; renderAuth(); return; }
  try { me = (await api("/auth/me")).user; }
  catch { me = null; }
  renderAuth();
}
async function logout(){
  try { await api("/auth/logout", { method:"POST" }); } catch {}
  token = null; localStorage.removeItem("forum_token"); me = null;
  renderAuth(); flash("התנתקת.", "ok");
}

// ---- email/password auth modal (login + join request) ----
let authMode = "login";
function openAuth(){
  $("googleBtn").href = API + "/auth/google/start";
  $("auEmail").value = $("auPass").value = $("auName").value = $("auFull").value = $("auReason").value = "";
  setAuthMode("login");
  $("authOverlay").classList.remove("hidden");
  $("auEmail").focus();
}
function closeAuth(){ $("authOverlay").classList.add("hidden"); }
function setAuthMode(mode){
  authMode = mode;
  const reg = mode === "register";
  document.querySelectorAll("#authOverlay .tab").forEach(t => t.classList.toggle("active", t.dataset.mode === mode));
  $("auFull").classList.toggle("hidden", !reg);
  $("auName").classList.toggle("hidden", !reg);
  $("auReason").classList.toggle("hidden", !reg);
  $("auPass").setAttribute("autocomplete", reg ? "new-password" : "current-password");
  $("auSubmit").textContent = reg ? "שלח בקשה" : "כניסה";
  $("authErr").classList.add("hidden");
}
async function submitAuth(){
  const email = $("auEmail").value.trim(), password = $("auPass").value;
  const path = authMode === "register" ? "/auth/register" : "/auth/login";
  const body = authMode === "register"
    ? { email, password, full_name: $("auFull").value.trim(), display_name: $("auName").value.trim(), reason: $("auReason").value.trim() }
    : { email, password };
  try{
    const r = await api(path, { method:"POST", body });
    token = r.token; localStorage.setItem("forum_token", token);
    closeAuth();
    await refreshMe(); await loadTopics();
    flash(authMode === "register" ? "בקשתך נשלחה וממתינה לאישור מנהל." : "התחברת!", "ok");
  } catch(e){
    $("authErr").textContent = e.message; $("authErr").classList.remove("hidden");
  }
}

    renderRequests((await api("/admin/requests")).requests);
  } catch(e){ flash(e.message, "err"); }
}

// ---- admin: manage all users ----
const STATUS_LABEL = { incomplete: "לא הושלם", pending: "ממתין", approved: "מאושר", rejected: "נדחה" };
const ROLE_LABEL = { member: "חבר", moderator: "מודרטור", admin: "מנהל" };
async function openUsers(){
  $("usersOverlay").classList.remove("hidden");
  $("usersList").innerHTML = `<div class="empty">טוען…</div>`;
  await reloadUsers();
}
function closeUsers(){ $("usersOverlay").classList.add("hidden"); }
async function reloadUsers(){
  try{ renderUsers((await api("/admin/users")).users); }
  catch(e){ $("usersList").innerHTML = `<div class="empty">${esc(e.message)}</div>`; }
}
function renderUsers(list){
  if (!list.length){ $("usersList").innerHTML = `<div class="empty">אין משתמשים.</div>`; return; }
  $("usersList").innerHTML = list.map(u => {
    const self = me && u.id === me.id;
    const roleSel = `<select class="in usr-role" data-id="${u.id}" ${self?"disabled":""} style="width:auto;padding:6px 10px">` +
      ["member","moderator","admin"].map(r => `<option value="${r}" ${r===u.role?"selected":""}>${ROLE_LABEL[r]}</option>`).join("") +
      `</select>`;
    let actions = "";
    if (u.status === "pending"){
      actions += `<button class="btn btn-gold btn-sm" data-approve="${u.id}">אשר</button>`;
      actions += `<button class="btn btn-danger btn-sm" data-reject="${u.id}">דחה</button>`;
    }
    if (!self)
      actions += `<button class="btn btn-light btn-sm" data-block="${u.id}" data-blocked="${u.is_blocked?1:0}">${u.is_blocked?"בטל חסימה":"חסום"}</button>`;
    const blockedTag = u.is_blocked ? ` <span class="role-tag" style="background:#fbeeeb;color:var(--danger)">חסום</span>` : "";
    return `<div class="req-row">
      <div><b>${esc(u.display_name)}</b>${self?' <span class="req-meta">(אתה)</span>':''}${blockedTag}</div>
      <div class="req-meta">${esc(u.full_name||"")} · ${esc(u.email)} · ${STATUS_LABEL[u.status]||esc(u.status)}</div>
      <div class="post-actions" style="align-items:center">${roleSel}${actions}</div>
    </div>`;
  }).join("");
  $("usersList").querySelectorAll(".usr-role").forEach(sel => sel.onchange = () => changeRole(sel.dataset.id, sel.value));
  $("usersList").querySelectorAll("[data-block]").forEach(el => el.onclick = () => toggleBlock(el.dataset.block, el.dataset.blocked === "0"));
  $("usersList").querySelectorAll("[data-approve]").forEach(el => el.onclick = () => decideUser(el.dataset.approve, true));
  $("usersList").querySelectorAll("[data-reject]").forEach(el => el.onclick = () => decideUser(el.dataset.reject, false));
}
async function changeRole(id, role){
  try{ await api(`/users/${id}/role`, { method:"PATCH", body:{ role }}); flash("התפקיד עודכן.", "ok"); }
  catch(e){ flash(e.message, "err"); }
  reloadUsers();
}
async function toggleBlock(id, blocked){
  try{ await api(`/users/${id}/block`, { method:"PATCH", body:{ blocked }}); flash(blocked?"המשתמש נחסם.":"החסימה בוטלה.", "ok"); reloadUsers(); }
  catch(e){ flash(e.message, "err"); }
}
async function decideUser(id, approve){
  try{ await api(`/users/${id}/${approve?"approve":"reject"}`, { method:"POST" }); flash(approve?"אושר.":"נדחה.", "ok"); reloadUsers(); }
  catch(e){ flash(e.message, "err"); }
}

// On the login redirect we land with #token=... (or #error=...) in the URL fragment.
function consumeHash(){
  const h = location.hash;
  if (h.startsWith("#token=")){
    token = decodeURIComponent(h.slice(7));
    localStorage.setItem("forum_token", token);
    history.replaceState(null, "", location.pathname + location.search);
    flash("התחברת בהצלחה!", "ok");
  } else if (h.startsWith("#error=")){
    history.replaceState(null, "", location.pathname + location.search);
    flash("ההתחברות נכשלה: " + decodeURIComponent(h.slice(7)), "err");
  }
}

  box.innerHTML = `<div class="cat ${activeCat===null?'active':''}" data-cat="">הכל</div>` +

  box.querySelectorAll(".cat").forEach(el => el.onclick = () => {

}

async function loadTopics(){
  const q = activeCat ? `?category=${activeCat}` : "";
  const data = await api("/topics" + q);
  const box = $("topics");
  if (!data.topics.length){
    box.innerHTML = `<div class="empty">אין עדיין נושאים כאן.${me ? " פתח את הראשון!" : ""}</div>`;
    return;
  }
  box.innerHTML = data.topics.map(t => `
    <div class="topic-row" data-id="${t.id}">
      <div>
        <div class="t-title">${t.is_locked?'<span class="lock">🔒 </span>':''}${esc(t.title)}</div>
        <div class="t-meta">מאת ${esc(t.author)} · עודכן ${when(t.last_post_at)}</div>
      </div>
      <span class="pill">${t.reply_count} ${t.reply_count===1?'הודעה':'הודעות'}</span>
    </div>`).join("");
  box.querySelectorAll(".topic-row").forEach(el =>
    el.onclick = () => openTopic(parseInt(el.getAttribute("data-id"),10)));
}

// ====== single topic ======
async function openTopic(id){
  curTopicId = id;
  const data = await api("/topics/" + id);
  const t = data.topic;
  $("topicTitle").innerHTML = (t.is_locked?'<span class="lock">🔒 </span>':'') + esc(t.title);

  // moderation row
  const mod = $("topicMod"); mod.innerHTML = "";
  if (atLeast("moderator")){
    mod.innerHTML =
      `<button class="btn btn-light btn-sm" id="lockBtn">${t.is_locked?"בטל נעילה":"נעל"}</button>` +
      `<button class="btn btn-danger btn-sm" id="delTopicBtn">מחק נושא</button>`;
    $("lockBtn").onclick = () => modLock(id, !t.is_locked);
    $("delTopicBtn").onclick = () => modDeleteTopic(id);
  }

  renderPosts(data.posts);

  // reply box / locked note
  const canReply = canPost() && (!t.is_locked || atLeast("moderator"));
  $("replyBox").classList.toggle("hidden", !canReply);
  $("lockedNote").classList.toggle("hidden", !(t.is_locked && !canReply));
  if (canReply){ setMode($("replyBody"), "text"); $("replyForm").onsubmit = (e) => { e.preventDefault(); submitReply(id); }; }

  show("viewTopic");
}

function renderPosts(posts){
  curPosts = posts;
  $("posts").innerHTML = posts.map(p => {
    const roleTag = p.author_role && p.author_role !== "member"
      ? ` <span class="role-tag role-${p.author_role}">${p.author_role==="admin"?"מנהל":"מודרטור"}</span>` : "";
    const editedNote = p.edited_at
      ? ((p.edited_by && p.edited_by !== p.user_id && p.editor_name) ? ` · נערך ע"י ${esc(p.editor_name)}` : " · נערך")
      : "";
    const mine = me && me.id === p.user_id;
    let actions = "";
    if (mine || atLeast("moderator")){
      actions += `<button class="btn btn-light btn-sm" data-act="del" data-id="${p.id}">מחק</button>`;
    }
    if (mine || atLeast("moderator")){
      actions = `<button class="btn btn-light btn-sm" data-act="edit" data-id="${p.id}">ערוך</button>` + actions;
    }
    // staff tools on OTHER users
    let staff = "";
    if (atLeast("moderator") && !mine){
      staff += `<button class="btn btn-light btn-sm" data-act="block" data-uid="${p.user_id}" data-name="${esc(p.author)}">חסום</button>`;
    }
    if (atLeast("admin") && !mine){
      staff += `<button class="btn btn-light btn-sm" data-act="role" data-uid="${p.user_id}" data-name="${esc(p.author)}" data-role="${p.author_role||'member'}">תפקיד</button>`;
    }
    return `<div class="post">
      <div class="post-head">
        <span class="who">${esc(p.author)}</span>${roleTag}
        <span class="when">${when(p.created_at)}${editedNote}</span>
        ${staff?`<span class="staff-menu">${staff}</span>`:""}
      </div>
      <div class="post-body">${renderBody(p.body)}</div>
      ${actions?`<div class="post-actions">${actions}</div>`:""}
    </div>`;
  }).join("");

  $("posts").querySelectorAll("[data-act]").forEach(el => el.onclick = () => {
    const act = el.getAttribute("data-act");
    const id = parseInt(el.getAttribute("data-id"),10);
    if (act === "del")   return deletePost(id);
    if (act === "edit")  return openEdit(id);
    if (act === "block") return staffBlock(parseInt(el.getAttribute("data-uid"),10), el.getAttribute("data-name"));
    if (act === "role")  return staffRole(parseInt(el.getAttribute("data-uid"),10), el.getAttribute("data-name"), el.getAttribute("data-role"));
  });
}

// ---- image upload: stores to R2 via the Worker, embeds Markdown ![](…) at the cursor ----
function insertAtCursor(ta, text){
  const s = ta.selectionStart ?? ta.value.length, e = ta.selectionEnd ?? ta.value.length;
  ta.value = ta.value.slice(0, s) + text + ta.value.slice(e);
  ta.focus(); ta.selectionStart = ta.selectionEnd = s + text.length;
}

// ---- rich-text toolbar (HTML mode) ----------------------------------------
// Each compose surface gets a toolbar + a text/HTML toggle. Formatting buttons
// wrap the selection in safe tags and flip the surface to HTML mode; on submit,
// composeBody() prefixes HTML_MARK so renderBody() sanitize-renders it.
const HTML_FMT_BTNS = [
  { label: "B",       title: "מודגש",     css: "font-weight:800",           wrap: ["<b>", "</b>"] },
  { label: "I",       title: "נטוי",       css: "font-style:italic",         wrap: ["<i>", "</i>"] },
  { label: "U",       title: "קו תחתון",   css: "text-decoration:underline", wrap: ["<u>", "</u>"] },
  { label: "כותרת",   title: "כותרת",                                        wrap: ["<h3>", "</h3>"] },
  { label: "• רשימה", title: "רשימה",                                        wrap: ["<ul>\n<li>", "</li>\n</ul>"] },
  { label: "❝ ציטוט", title: "ציטוט",                                        wrap: ["<blockquote>", "</blockquote>"] },
  { label: "🎨 צבע",  title: "צבע טקסט",  color: true },
];
function wrapSelection(ta, before, after){
  ta.focus();
  const s = ta.selectionStart ?? ta.value.length, e = ta.selectionEnd ?? ta.value.length;
  const sel = ta.value.slice(s, e);
  const ins = before + sel + after;
  ta.value = ta.value.slice(0, s) + ins + ta.value.slice(e);
  const pos = sel ? s + ins.length : s + before.length;   // selection wrapped -> after; empty -> between tags
  ta.selectionStart = ta.selectionEnd = pos;
  ta.focus();
}
function setMode(ta, mode){
  ta.dataset.mode = mode;
  const tb = ta._toolbar;
  if (!tb) return;
  tb.classList.toggle("html-on", mode === "html");
  const tog = tb.querySelector(".mode-toggle");
  if (tog) tog.textContent = mode === "html" ? "✦ מצב עיצוב (HTML)" : "מצב טקסט רגיל";
}
function applyFormat(ta, b){
  setMode(ta, "html");
  if (b.color){
    openModal({ title: "צבע טקסט",
      bodyHTML: `<input class="in" type="color" data-field="c" value="#c0492f" style="width:64px;height:42px;padding:2px">`
              + `<p class="modal-sub">בחר צבע ולחץ "החל" — הוא יחול על הטקסט המסומן.</p>`,
      okText: "החל" }).then(r => { if (r && r.c) wrapSelection(ta, `<span style="color:${r.c}">`, "</span>"); });
    return;
  }
  wrapSelection(ta, b.wrap[0], b.wrap[1]);
}
function makeToolbar(ta){
  const tb = document.createElement("div");
  tb.className = "editor-toolbar";
  for (const b of HTML_FMT_BTNS){
    const btn = document.createElement("button");
    btn.type = "button"; btn.className = "fmt-btn"; btn.title = b.title; btn.textContent = b.label;
    if (b.css) btn.setAttribute("style", b.css);
    btn.onclick = () => applyFormat(ta, b);
    tb.appendChild(btn);
  }
  const tog = document.createElement("button");
  tog.type = "button"; tog.className = "mode-toggle";
  tog.title = "החלפה בין כתיבה רגילה לכתיבה עם תגיות HTML";
  tog.onclick = () => setMode(ta, ta.dataset.mode === "html" ? "text" : "html");
  tb.appendChild(tog);
  ta._toolbar = tb;
  ta.parentNode.insertBefore(tb, ta);
  setMode(ta, "text");
}
// The body we send: HTML-mode posts get the marker prefix so the renderer sanitizes them.
function composeBody(ta){
  return ta.dataset.mode === "html" ? HTML_MARK + "\n" + ta.value : ta.value;
}
// ---- link insert: asks for URL + optional display text, drops Markdown [text](url) at the cursor ----
async function insertLink(textarea){
  // pre-fill the URL field if the user already selected a URL in the textarea
  const sel = textarea.value.slice(textarea.selectionStart ?? 0, textarea.selectionEnd ?? 0).trim();
  const r = await openModal({
    title: "הוספת קישור",
    bodyHTML:
      `<label class="fld">כתובת (URL)</label>` +
      `<input class="in" data-field="url" placeholder="https://..." value="${esc(/^https?:\/\//i.test(sel) ? sel : "")}" style="margin-bottom:10px">` +
      `<label class="fld">טקסט להצגה (לא חובה)</label>` +
      `<input class="in" data-field="text" placeholder="הטקסט שיוצג כקישור">`,
    okText: "הוסף קישור" });
  if (!r) return;
  let url = (r.url || "").trim();
  if (!url) return flash("לא הוזנה כתובת.", "err");
  if (!/^https?:\/\//i.test(url)) url = "https://" + url;   // forgive a missing scheme
  const text = (r.text || "").trim();
  // HTML mode -> real <a> tag (sanitized on render); text mode -> Markdown / bare URL
  if (textarea.dataset.mode === "html"){
    insertAtCursor(textarea, `<a href="${url}">${text || url}</a>`);
  } else {
    insertAtCursor(textarea, text ? `[${text}](${url})` : ` ${url} `);
  }
}
async function uploadAndInsert(input, textarea){
  const file = input.files && input.files[0];
  input.value = "";  // allow re-picking the same file later
  if (!file) return;
  flash("מעלה תמונה…", "ok");
  try{
    const fd = new FormData(); fd.append("image", file);
    const headers = {}; if (token) headers["Authorization"] = "Bearer " + token;
    const res = await fetch(API + "/upload", { method:"POST", headers, body:fd });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || ("HTTP " + res.status));
    insertAtCursor(textarea, textarea.dataset.mode === "html" ? `\n<img src="${data.url}">\n` : `\n![](${data.url})\n`);
    flash("התמונה הוטמעה — שלח כדי לפרסם.", "ok");
  } catch(e){ flash(e.message, "err"); }
}
async function deletePost(id){
  if (!await confirmDialog("מחיקת הודעה", "למחוק את ההודעה?", "מחק")) return;
  try{ await api(`/posts/${id}`, { method:"DELETE" }); openTopic(curTopicId); }
  catch(e){ flash(e.message, "err"); }
}
// Dedicated edit modal: pre-fills the RAW body (keeps ![](…) image markup intact) and
// offers the same image button as compose, so images survive — and can be added — in edit.
let editingId = null;
function openEdit(id){
  const post = curPosts.find(p => p.id === id);
  editingId = id;
  let body = post ? post.body : "";
  if (body.startsWith(HTML_MARK)){ body = body.slice(HTML_MARK.length).replace(/^\n/, ""); setMode($("editBody"), "html"); }
  else setMode($("editBody"), "text");
  $("editBody").value = body;
  $("editOverlay").classList.remove("hidden");
  $("editBody").focus();
}
function closeEdit(){ $("editOverlay").classList.add("hidden"); editingId = null; }
async function saveEdit(){
  if (!$("editBody").value.trim()) return flash("ההודעה ריקה.", "err");
  const body = composeBody($("editBody"));
  try{ await api(`/posts/${editingId}`, { method:"PATCH", body:{ body }}); closeEdit(); openTopic(curTopicId); }
  catch(e){ flash(e.message, "err"); }
}

async function staffBlock(uid, name){
  if (!await confirmDialog("חסימת משתמש",
      `לחסום את ${name}? הוא לא יוכל לכתוב יותר, וההתחברות הפעילה שלו תינתק מיד.`, "חסום")) return;
  try{ await api(`/users/${uid}/block`, { method:"PATCH", body:{ blocked:true }}); flash(`${name} נחסם.`,"ok"); openTopic(curTopicId); }
  catch(e){ flash(e.message, "err"); }
}
async function staffRole(uid, name, current){
  const opts = [["member","חבר"],["moderator","מודרטור"],["admin","מנהל"]]
    .map(([v,l]) => `<option value="${v}" ${v===current?"selected":""}>${l}</option>`).join("");
  const r = await openModal({ title:`תפקיד עבור ${name}`,
    bodyHTML:`<select class="in" data-field="role">${opts}</select>` +
             `<p class="modal-sub">מודרטור: ניהול נושאים והודעות, חסימת משתמשים.<br>מנהל: + ניהול קטגוריות ותפקידים.</p>`,
    okText:"עדכן תפקיד" });
  if (!r) return;
  try{ await api(`/users/${uid}/role`, { method:"PATCH", body:{ role:r.role }}); flash(`התפקיד של ${name} עודכן.`,"ok"); openTopic(curTopicId); }
  catch(e){ flash(e.message, "err"); }
}
async function addCategory(){
  const r = await openModal({ title:"קטגוריה חדשה",
    bodyHTML:`<input class="in" data-field="name" maxlength="120" placeholder="שם הקטגוריה">`,
    okText:"הוסף" });

  try{ await api("/categories", { method:"POST", body:{ name:r.name.trim() }}); flash("הקטגוריה נוספה.","ok"); loadCategories(); }
  catch(e){ flash(e.message, "err"); }
}
